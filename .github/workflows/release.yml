name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version without the v prefix, for example 0.1.0'
        required: true
        type: string

permissions:
  contents: write

env:
  BUN_VERSION: 1.3.13
  WAILS_VERSION: v3.0.0-alpha2.106
  APP_NAME: fiach

jobs:
  release-init:
    name: Prepare Draft Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
            version="${version#v}"
            tag="v${version}"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -f "${tag}" "${GITHUB_SHA}"
            git push -f origin "refs/tags/${tag}"
          else
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ steps.release.outputs.tag }}"
          version="${{ steps.release.outputs.version }}"

          if gh release view "${tag}" >/dev/null 2>&1; then
            echo "Release ${tag} already exists."
          else
            gh release create "${tag}" \
              --draft \
              --title "v${version}"
          fi

  windows:
    name: Windows
    runs-on: windows-latest
    needs:
      - release-init

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          if (Test-Path "C:\Program Files (x86)\NSIS") {
            $nsisPath = "C:\Program Files (x86)\NSIS"
            $nsisPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            $env:PATH += ";$nsisPath"
          }
          if (Test-Path "C:\Program Files\NSIS") {
            $nsisPath = "C:\Program Files\NSIS"
            $nsisPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            $env:PATH += ";$nsisPath"
          }
          Get-Command makensis -ErrorAction SilentlyContinue | Out-Null

      - name: Build Windows executable
        run: wails3 task windows:build

      - name: Build Windows installer
        run: wails3 task windows:package

      - name: Collect Windows artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/windows | Out-Null
          Copy-Item "bin/${{ env.APP_NAME }}.exe" "artifacts/windows/${{ env.APP_NAME }}-windows-x64-portable.exe"
          Copy-Item "bin/${{ env.APP_NAME }}-amd64-installer.exe" "artifacts/windows/${{ env.APP_NAME }}-windows-x64-installer.exe"

      - name: Upload Windows release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "${{ needs.release-init.outputs.tag }}" \
            "artifacts/windows/${{ env.APP_NAME }}-windows-x64-portable.exe" \
            "artifacts/windows/${{ env.APP_NAME }}-windows-x64-installer.exe" \
            --clobber

  macos:
    name: macOS
    runs-on: macos-latest
    needs:
      - release-init

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}

      - name: Build macOS universal app
        run: wails3 task darwin:package:universal

      - name: Archive macOS app
        run: |
          mkdir -p artifacts/macos
          ditto -c -k --sequesterRsrc --keepParent "bin/${APP_NAME}.app" "artifacts/macos/${APP_NAME}-macos-universal.zip"

      - name: Upload macOS release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.release-init.outputs.tag }}" \
            "artifacts/macos/${APP_NAME}-macos-universal.zip" \
            --clobber

  linux:
    name: Linux
    runs-on: ubuntu-latest
    needs:
      - release-init

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-4-dev \
            libwebkitgtk-6.0-dev \
            libsoup-3.0-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}

      - name: Build Linux binary
        run: wails3 task linux:build

      - name: Package Linux artifacts
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
          GIT_COMMITTER_NAME: phergul
          GIT_COMMITTER_EMAIL: actions@github.com
        run: |
          wails3 task linux:create:appimage
          wails3 task linux:create:deb
          wails3 task linux:create:rpm

      - name: Collect Linux artifacts
        run: |
          mkdir -p artifacts/linux
          cp "bin/${APP_NAME}" "artifacts/linux/${APP_NAME}-linux-x64"
          cp bin/*.AppImage "artifacts/linux/${APP_NAME}-linux-x64.AppImage"
          cp bin/*.deb "artifacts/linux/${APP_NAME}-linux-amd64.deb"
          cp bin/*.rpm "artifacts/linux/${APP_NAME}-linux-x86_64.rpm"

      - name: Upload Linux release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.release-init.outputs.tag }}" \
            "artifacts/linux/${APP_NAME}-linux-x64" \
            "artifacts/linux/${APP_NAME}-linux-x64.AppImage" \
            "artifacts/linux/${APP_NAME}-linux-amd64.deb" \
            "artifacts/linux/${APP_NAME}-linux-x86_64.rpm" \
            --clobber
