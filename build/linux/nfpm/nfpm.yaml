# Feel free to remove those if you don't want/need to use them.
# Make sure to check the documentation at https://nfpm.goreleaser.com
#
# The lines below are called `modelines`. See `:help modeline`

name: "fiach"
arch: ${GOARCH}
platform: "linux"
version: "0.3.0"
section: "default"
priority: "extra"
maintainer: ${GIT_COMMITTER_NAME} <${GIT_COMMITTER_EMAIL}>
description: "Fiach: A general-purpose mod manager"
vendor: "phergul"
homepage: "https://wails.io"
license: "MIT"
release: "1"

contents:
  - src: "./bin/fiach"
    dst: "/usr/local/bin/fiach"
  - src: "./build/appicon.png"
    dst: "/usr/share/icons/hicolor/128x128/apps/fiach.png"
  - src: "./build/linux/fiach.desktop"
    dst: "/usr/share/applications/fiach.desktop"

# Default dependencies for Debian 13/Ubuntu 24.04+ with WebKitGTK 6.0
depends:
  - libgtk-4-1
  - libwebkitgtk-6.0-4

# Distribution-specific overrides for different package formats
overrides:
  rpm:
    depends:
      - gtk4
      - webkitgtk6.0

  archlinux:
    depends:
      - gtk4
      - webkitgtk-6.0

# scripts section to ensure desktop database is updated after install
scripts:
  postinstall: "./build/linux/nfpm/scripts/postinstall.sh"
  # You can also add preremove, postremove if needed
  # preremove: "./build/linux/nfpm/scripts/preremove.sh"
  # postremove: "./build/linux/nfpm/scripts/postremove.sh"

