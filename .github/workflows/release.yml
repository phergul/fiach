name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version without the v prefix, for example 0.1.0'
        required: true
        type: string

permissions:
  contents: write

env:
  BUN_VERSION: 1.3.13
  WAILS_VERSION: v3.0.0-alpha.77
  APP_NAME: fiach

jobs:
  windows:
    name: Windows
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          if (Test-Path "C:\Program Files (x86)\NSIS") {
            $nsisPath = "C:\Program Files (x86)\NSIS"
            $nsisPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            $env:PATH += ";$nsisPath"
          }
          if (Test-Path "C:\Program Files\NSIS") {
            $nsisPath = "C:\Program Files\NSIS"
            $nsisPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            $env:PATH += ";$nsisPath"
          }
          Get-Command makensis -ErrorAction SilentlyContinue | Out-Null

      - name: Build Windows executable
        run: wails3 task windows:build

      - name: Build Windows installer
        run: wails3 task windows:package

      - name: Collect Windows artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/windows | Out-Null
          Copy-Item "bin/${{ env.APP_NAME }}.exe" artifacts/windows/
          Copy-Item "bin/${{ env.APP_NAME }}-*-installer.exe" artifacts/windows/

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: artifacts/windows/*

  macos:
    name: macOS
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}

      - name: Build macOS universal app
        run: wails3 task darwin:package:universal

      - name: Archive macOS app
        run: |
          mkdir -p artifacts/macos
          ditto -c -k --sequesterRsrc --keepParent "bin/${APP_NAME}.app" "artifacts/macos/${APP_NAME}-macos-universal.zip"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: artifacts/macos/*

  linux:
    name: Linux
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}

      - name: Build Linux binary
        run: wails3 task linux:build

      - name: Package Linux artifacts
        env:
          GIT_COMMITTER_NAME: phergul
          GIT_COMMITTER_EMAIL: actions@github.com
        run: |
          wails3 task linux:create:appimage || true
          wails3 task linux:create:deb || true
          wails3 task linux:create:rpm || true

      - name: Collect Linux artifacts
        run: |
          mkdir -p artifacts/linux
          cp "bin/${APP_NAME}" artifacts/linux/
          find bin -maxdepth 1 -type f \( -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' \) -exec cp {} artifacts/linux/ \;

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: artifacts/linux/*

  release:
    name: Draft GitHub Release
    runs-on: ubuntu-latest
    needs:
      - windows
      - macos
      - linux

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
            version="${version#v}"
            tag="v${version}"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -f "${tag}" "${GITHUB_SHA}"
            git push -f origin "refs/tags/${tag}"
          else
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: fiach ${{ steps.release.outputs.version }}
          draft: true
          prerelease: false
          fail_on_unmatched_files: true
          files: release-artifacts/**/*
